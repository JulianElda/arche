name: SonarCloud

on:
  push:
    branches: [master]
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --ignore-scripts --frozen-lockfile
      - run: ./node_modules/.bin/playwright install chromium --with-deps --no-shell
      - run: bun run --filter @julianelda/domos test -- --coverage --coverage.reporter=lcov --coverage.reportsDirectory=./coverage
      - run: bun run --filter @julianelda/scratchpad test -- --coverage --coverage.reporter=lcov --coverage.reportsDirectory=./coverage
      - uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e # master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
